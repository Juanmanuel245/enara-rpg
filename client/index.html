<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG multijugador</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d1117;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      .name-screen {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(ellipse 80% 60% at 50% 40%, #161b22 0%, #0d1117 70%);
      }
      .name-screen.hidden {
        display: none;
      }
      .name-card {
        width: min(100%, 380px);
        padding: 28px 24px;
        border-radius: 12px;
        border: 1px solid #30363d;
        background: #161b22;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      }
      .name-card h1 {
        font-family: system-ui, sans-serif;
        font-size: 1.35rem;
        font-weight: 600;
        color: #e6edf3;
        margin-bottom: 8px;
      }
      .name-card .hint {
        font-family: system-ui, sans-serif;
        font-size: 0.9rem;
        color: #8b949e;
        margin-bottom: 20px;
      }
      .name-card form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .name-card input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 8px;
        border: 1px solid #30363d;
        background: #0d1117;
        color: #e6edf3;
        font-size: 1rem;
        font-family: system-ui, sans-serif;
      }
      .name-card input:focus {
        outline: none;
        border-color: #58a6ff;
        box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
      }
      .name-card button {
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        background: #238636;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        font-family: system-ui, sans-serif;
        cursor: pointer;
      }
      .name-card button:hover {
        background: #2ea043;
      }
      .name-card .name-error {
        margin-top: 12px;
        font-family: system-ui, sans-serif;
        font-size: 0.85rem;
        color: #f85149;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div id="name-screen" class="name-screen" aria-modal="true" role="dialog" aria-labelledby="name-title">
      <div class="name-card">
        <h1 id="name-title">RPG multijugador</h1>
        <p class="hint">¿Cómo se llama tu personaje?</p>
        <form id="name-form" autocomplete="on">
          <label for="player-name" class="visually-hidden">Nombre del personaje</label>
          <input
            id="player-name"
            name="playerName"
            type="text"
            maxlength="24"
            placeholder="Escribe tu nombre"
            required
            autofocus
            autocomplete="username"
          />
          <button type="submit">Entrar al mundo</button>
        </form>
        <p id="name-error" class="name-error" hidden></p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
